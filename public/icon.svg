<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e2640"/>
      <stop offset="100%" stop-color="#0f1520"/>
    </linearGradient>
    <linearGradient id="nooly-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (safe zone for maskable) -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Nest arcs — three concentric curves, green gradient -->
  <path d="M 100,390 Q 256,168 412,390"
        stroke="url(#nooly-grad)" stroke-width="20" fill="none" stroke-linecap="round"/>
  <path d="M 150,390 Q 256,215 362,390"
        stroke="url(#nooly-grad)" stroke-width="15" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M 200,390 Q 256,258 312,390"
        stroke="url(#nooly-grad)" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.28"/>

  <!-- Bold N lettermark -->
  <text x="256" y="308"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="800" font-size="262" fill="white"
        text-anchor="middle">N</text>
</svg>
