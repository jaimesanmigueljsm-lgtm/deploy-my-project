<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep navy, slightly lighter at top -->
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#070c18"/>
    </linearGradient>

    <!-- N lettermark gradient: mint → emerald → cyan -->
    <linearGradient id="ng" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#6eefb2"/>
      <stop offset="45%"  stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Ambient top glow -->
    <radialGradient id="glow" cx="50%" cy="20%" r="60%">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle inner border highlight -->
    <linearGradient id="border-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Rounded square base -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Ambient top-center glow overlay -->
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Inner border highlight (top edge only, gives depth) -->
  <rect x="1" y="1" width="510" height="510" rx="111"
        fill="none" stroke="url(#border-hi)" stroke-width="1.5"/>

  <!-- N lettermark — premium gradient fill -->
  <text
    x="256" y="338"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter Tight', 'Segoe UI', system-ui, sans-serif"
    font-weight="900"
    font-size="280"
    fill="url(#ng)"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-8"
  >N</text>
</svg>
